<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>EDD Jardin Sauvage — Gestion</title>
  <link rel="stylesheet" href="css/styles.css" />
  <!-- PWA : installable sur smartphone -->
  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#241d19" />
  <link rel="apple-touch-icon" href="assets/icon-192.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Jardin Sauvage" />
  <meta name="mobile-web-app-capable" content="yes" />
</head>
<body>
  <!-- Écran de connexion -->
  <div id="login" class="login-wrap"></div>

  <!-- Application -->
  <div id="appShell" style="display:none">
    <header class="topbar">
      <div class="brand">
        <img src="assets/logo.png" onerror="this.onerror=null;this.src='assets/logo.svg'" alt="Jardin Sauvage" class="logo-header" />
        <span>EDD Jardin Sauvage</span>
        <span id="modeBadge" class="badge"></span>
      </div>
      <div>
        <span class="who" id="meName"></span>
        <button class="small gray" id="backupBtn" style="display:none" title="Sauvegarder toutes les données (JSON)" aria-label="Sauvegarder toutes les données">💾</button>
        <button class="small gray" id="logoutBtn">Déconnexion</button>
      </div>
    </header>
    <nav id="nav" class="nav"></nav>
    <main id="app" class="container"></main>
  </div>

  <div id="loadbar"></div>
  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <!-- Bibliothèques externes (mode cloud + graphiques + PDF).
       Chargées via CDN ; l'app fonctionne même si elles manquent (dégradé). -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.8.2/dist/jspdf.plugin.autotable.min.js"></script>

  <!-- Application -->
  <script src="js/config.js"></script>
  <script src="js/store.js"></script>
  <script src="js/app.js"></script>

  <!-- Enregistrement du service worker (installation sur smartphone + hors ligne) -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch((e) => console.warn('SW non enregistré', e));
      });
    }
  </script>
</body>
</html>
