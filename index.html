<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>École des devoirs — Gestion</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <!-- Écran de connexion -->
  <div id="login" class="login-wrap"></div>

  <!-- Application -->
  <div id="appShell" style="display:none">
    <header class="topbar">
      <div class="brand">🏫 École des devoirs <span id="modeBadge" class="badge"></span></div>
      <div>
        <span class="who" id="meName"></span>
        <button class="small gray" id="logoutBtn">Déconnexion</button>
      </div>
    </header>
    <nav id="nav" class="nav"></nav>
    <main id="app" class="container"></main>
  </div>

  <div id="toast" class="toast"></div>

  <!-- Bibliothèques externes (mode cloud + graphiques + PDF).
       Chargées via CDN ; l'app fonctionne même si elles manquent (dégradé). -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.8.2/dist/jspdf.plugin.autotable.min.js"></script>

  <!-- Application -->
  <script src="js/config.js"></script>
  <script src="js/store.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
